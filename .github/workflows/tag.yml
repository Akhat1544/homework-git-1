name: Auto Tag

on:
  push:
    branches:
      - master

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          DATE=$(date +'%Y.%m.%d')
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag $DATE
          git push origin $DATE
